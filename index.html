<!DOCTYPE html>

<html lang="es">
<head>

  <title>Variadisima Stereo</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      width: 90%;
      max-width: 400px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 24px;
    }

    .status {
      margin: 10px 0;
      font-size: 18px;
      color: #00ffcc;
    }

    button {
      background: #00ffcc;
      border: none;
      padding: 15px 30px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      color: #000;
      margin-top: 15px;
      transition: 0.3s;
      width: 100%;
    }

    button:hover {
      background: #00ccaa;
    }

    .footer {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>

</head>

<body>

  </div>

  <script>
    const radio = document.getElementById("radio");
    const btn = document.getElementById("btn");

    function togglePlay() {
      if (radio.paused) {
        radio.play()
          .then(() => {
            btn.innerHTML = "⏸️ Pausar";
          })
          .catch(() => {
            alert("Debes interactuar primero con la página para reproducir el audio");
          });
      } else {
        radio.pause();
        btn.innerHTML = "▶️ Escuchar";
      }
    }
  </script>
