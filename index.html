<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variadisima Stereo</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      width: 90%;
      max-width: 400px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 24px;
    }

    .status {
      margin: 10px 0;
      font-size: 18px;
      color: #00ffcc;
    }

    button {
      background: #00ffcc;
      border: none;
      padding: 15px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      color: #000;
      width: 100%;
      transition: 0.3s;
    }

    button:hover {
      background: #00ccaa;
    }
  </style>

</head>
