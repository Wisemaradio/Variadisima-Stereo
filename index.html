<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Variadisima Stereo</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0b3c7a, #001f3f);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* LOGO WISEMA */
.logo-wisema {
    width: 140px;
    margin-bottom: 15px;
}

/* TARJETA */
.card {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    color: white;
    backdrop-filter: blur(10px);
}

/* LOGO EMISORA */
.logo {
    width: 170px;
    height: 170px;
    object-fit: contain;
    border-radius: 20px;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    margin-bottom: 15px;
}

h1 {
    font-size: 20px;
    margin: 10px 0;
}

.location {
    font-size: 13px;
    opacity: 0.8;
}

.live {
    color: #00ff88;
    margin: 10px 0;
    font-size: 14px;
    min-height: 20px;
}

.btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 25px;
    font-size: 14px;
    cursor: pointer;
}

.play {
    background: #1db954;
    color: white;
}

.share {
    background: #1e90ff;
    color: white;
}

.social {
    margin-top: 15px;
}

.social a img {
    width: 35px;
    margin: 5px;
}

audio {
    display: none;
}
</style>
</head>

<body>

<div class="card">

    <!-- 🔥 LOGO WISEMA -->
    <img src="logowisema.png" class="logo-wisema">

    <!-- LOGO EMISORA -->
    <img src="logo.png" class="logo">

    <h1>Variadisima Stereo</h1>
    <div class="location">El Carmen de Bolívar - Colombia</div>

    <div class="live" id="live">🎵 En vivo</div>

    <button id="playBtn" class="btn play" onclick="toggleRadio()">
        ▶ Escuchar en vivo
    </button>

    <button class="btn share" onclick="shareRadio()">📲 Compartir emisora</button>

    <div class="social">

        <a href="https://wa.me/573006804135" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        </a>

        <a href="https://www.tiktok.com/@djdanielmontes" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
        </a>

        <a href="https://www.instagram.com/dj_locutor_daniel_montes" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png">
        </a>

        <a href="https://www.facebook.com/share/1Km98y8dEj/" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
        </a>

    </div>

</div>

<audio id="radio">
    <source src="https://variadisima.wisemaradio.com/listen/variadisima/radio.mp3" type="audio/mpeg">
</audio>

<script>

let radio = document.getElementById("radio");
let btn = document.getElementById("playBtn");

function toggleRadio() {
    if (radio.paused) {
        radio.play();
        btn.innerHTML = "⏸ Pausar";
    } else {
        radio.pause();
        btn.innerHTML = "▶ Escuchar en vivo";
    }
}

async function getMetadata() {
    try {
        let res = await fetch("https://variadisima.wisemaradio.com/api/nowplaying/variadisima");
        let data = await res.json();

        let song = data.now_playing.song.text;

        if (song && song.trim() !== "") {
            document.getElementById("live").innerText = "🎶 " + song;
        } else {
            document.getElementById("live").innerText = "🎵 En vivo";
        }

    } catch {
        document.getElementById("live").innerText = "🎵 En vivo";
    }
}

setInterval(getMetadata, 10000);
getMetadata();

function shareRadio() {
    if (navigator.share) {
        navigator.share({
            title: "Variadisima Stereo",
            text: "Escucha nuestra emisora en vivo",
            url: window.location.href
        });
    } else {
        alert("Comparte este enlace: " + window.location.href);
    }
}

</script>

</body>
</html>
