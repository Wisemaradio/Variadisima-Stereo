<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Variadisima Stereo On Line</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    background: radial-gradient(circle at top, #1f1f2e, #0d0d14);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.card{
    width:320px;
    padding:30px;
    border-radius:25px;
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.logo{
    width:120px;
    height:120px;
    margin:0 auto 20px;
    border-radius:50%;
    background:linear-gradient(135deg,#00ffc6,#007cf0);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
}

h1{
    font-size:20px;
    margin-bottom:10px;
}

.live{
    font-size:12px;
    color:#00ffc6;
    margin-bottom:20px;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0.3;}
}

button{
    width:80px;
    height:80px;
    border-radius:50%;
    border:none;
    background:linear-gradient(135deg,#00ffc6,#007cf0);
    font-size:28px;
    color:white;
    cursor:pointer;
    margin:20px 0;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.metadata{
    font-size:14px;
    margin-top:15px;
    opacity:0.9;
    min-height:40px;
}

.footer{
    margin-top:20px;
    font-size:12px;
    opacity:0.6;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">🎧</div>

<h1>Variadisima Stereo</h1>
<div class="live" id="liveStatus">OFF AIR</div>

<button id="playBtn">▶</button>

<div class="metadata" id="metadata">
Cargando...
</div>

<div class="footer">
La Radio De La Gente
</div>

</div>

<audio id="audio"></audio>

<script>

const streamURL = "https://corsproxy.io/?http://190.60.35.218:8000/radio.mp3";

const audio = document.getElementById("audio");
const btn = document.getElementById("playBtn");
const metadataDiv = document.getElementById("metadata");
const liveStatus = document.getElementById("liveStatus");

let playing = false;

btn.addEventListener("click", () => {
    if (!playing) {
        audio.src = streamURL;
        audio.play();
        btn.innerHTML = "⏸";
        liveStatus.innerHTML = "● EN VIVO";
        liveStatus.style.color = "#00ffc6";
        playing = true;
    } else {
        audio.pause();
        btn.innerHTML = "▶";
        liveStatus.innerHTML = "OFF AIR";
        liveStatus.style.color = "#aaa";
        playing = false;
    }
});

// METADATOS
async function getMetadata(){
    try{
        let res = await fetch("http://190.60.35.218:8000/status-json.xsl");
        let data = await res.json();

        let source = data.icestats.source;

        let title = source.title || "En vivo";
        metadataDiv.innerHTML = "🎵 " + title;

    }catch{
        metadataDiv.innerHTML = "🎵 En vivo";
    }
}

setInterval(getMetadata,10000);
getMetadata();

</script>

</body>
</html>
